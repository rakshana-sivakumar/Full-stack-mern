<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 200vh;
        }
        .Navbar{
            position: sticky;
            top:0;
        }
        .Relative{
            border: 2px solid green;
            position: relative;
            height: 50vh;
            margin-top: 18px;
        }
        .absolute{
            border: 2px solid red;
            position: absolute;
            margin: 10px;
            margin-left: 50px;
        }
        .fixed{
            position: fixed;
        }
    </style>
</head>
<body>
    <div class="Navbar">
        <nav>
            <ul>
                <li>home</li>
                <li>about</li>
                <li>service</li>
                <li> contact</li>
            </ul>
        </nav>
    </div>
    <div class="Relative">
        <h1>relative</h1>
        <div class="absolute">
            <h1>absolute</h1>
        </div>
    </div>
    <div class="fixed">Fixed</div>
    
</body>
</html>
